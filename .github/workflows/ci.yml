name: CI Pipeline

on:
  push:
    branches: [main]

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python -m pytest


  build-docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v3

      - run: docker build -t myapp:${{ github.sha }} .

      - run: docker run -d -p 5000:5000 --name test-container myapp:${{ github.sha }}

      - run: sleep 5

      - run: curl http://localhost:5000/api/health

      - run: docker stop test-container


  report:
    needs: build-docker
    runs-on: ubuntu-latest
    steps:
      - name: Print Pipeline Summary
        run: echo 'Pipeline complete for commit: ${{ github.sha }}'
        
      - name: Test Secret Loading
        env:
          THE_SECRET: ${{ secrets.LAB_SECRET }}
        run: echo 'Secret loaded successfully'