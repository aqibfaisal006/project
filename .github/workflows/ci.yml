name: CI Pipeline

on:
  push:
    branches: [main]

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python -m pytest


  build-docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v3

      - run: docker build -t myapp:${{ github.sha }} .

      - run: docker run -d -p 5000:5000 --name test-container myapp:${{ github.sha }}

      - run: sleep 5

      - run: curl http://localhost:5000/api/health

      - run: docker stop test-container


  report:
    runs-on: ubuntu-latest
    needs: build-docker

    steps:
      - name: Print summary
        run: echo "Pipeline complete for commit ${{ github.sha }}"

      - name: Use secret safely
        run: echo "Secret loaded successfully"
        env:
          MY_SECRET: ${{ secrets.LAB_SECRET }}